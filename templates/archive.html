<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baseball Daily Archive</title>
  <style>$css</style>
</head>
<body>
  <main class="paper archive-paper">
    <header class="masthead">
      <div class="kicker">
        <span>Local Edition</span>
        <span>Morning Sports Pages</span>
        <span>Generated $generated_on</span>
      </div>
      <div class="title-row">
        <div class="date-box"><a href="index.html">Latest Edition</a></div>
        <h1>Baseball Daily</h1>
        <div class="search-box">Archive</div>
      </div>
    </header>
    <section class="archive-list">
      <h2>Edition Archive</h2>
      <p class="archive-note">Completed daily editions, newest first.</p>
      <ul>
        $archive_links
      </ul>
    </section>
  </main>
</body>
</html>
